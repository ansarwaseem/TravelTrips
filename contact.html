<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 1</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome CDN Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <!-- ----------------------Header Section------------------   -->
    <header class="header">
      <div class="container">
        <div class="logo">
          <h2><a href="/index.html">TravelTrips</a></h2>
        </div>
        <div class="nav-links">
          <ul class="nav-items">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/Trips.html" target="_blank">Trips</a></li>
            <li><a href="/about.html" target="_blank">About</a></li>
            <li><a href="/contact.html">Contact</a></li>
          </ul>
        </div>
        <div class="btn-container">
          <button class="primaryBTN">Login</button>
          <button class="secondaryBTN">Sign Up</button>
        </div>
      </div>
    </header>

    <!-- ------------------------------------ HERO SECTION ------------------- -->
    <main class="contact-container">
      <section class="contact-content">
        <h1>Get in Touch</h1>
        <p>
          Ready to map out your next great escape? <br />
          Drop us a line to unlock custom itineraries, hidden gems, and seamless
          planning. <br />
          Your journey begins with a single message.
        </p>
      </section>

      <form class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Muhammad Ali" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="abc@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            rows="4"
            placeholder="How can we help you?"
            required
          ></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </main>

    <!-- -------------------------------- FOOTER SECTION -------------------  -->
    <footer class="site-footer">
      <div class="footer-container">
        <!-- Social Media Icons (Embedded SVGs) -->
        <div class="social-icons">
          <!-- Facebook -->
          <a
            href="https://facebook.com"
            target="_blank"
            rel="noopener"
            aria-label="Facebook"
          >
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
              ></path>
            </svg>
          </a>
          <!-- Twitter / X -->
          <a
            href="https://twitter.com"
            target="_blank"
            rel="noopener"
            aria-label="Twitter"
          >
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4  9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"
              ></path>
            </svg>
          </a>
          <!-- Instagram -->
          <a
            href="https://instagram.com"
            target="_blank"
            rel="noopener"
            aria-label="Instagram"
          >
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
        </div>

        <!-- Copyright Line -->
        <div class="footer-bottom">
          <p>&copy; 2026 MyWebsite. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <!-- ---------------JavaScript for Sticky Header---------------- -->
    <script>
      const header = document.querySelector(".header");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 20) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
      });
    </script>
  </body>
</html>
